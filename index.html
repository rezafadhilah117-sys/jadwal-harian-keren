<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruang Jadwal Teza</title>
    
    <!-- Google Fonts untuk Estetika -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons untuk Ikon Minimalis -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: '#FDFBF7', // Latar belakang utama
                        cardBg: 'rgba(255, 255, 255, 0.65)', // Glass effect
                        textMain: '#5C544E', // Warna teks yang tidak terlalu hitam (soft)
                        textLight: '#9A928C',
                        
                        // Pastel Accents
                        sage: '#C3D3C4',
                        blush: '#F3D4D4',
                        dustyBlue: '#C5D3E8',
                        lilac: '#E2D5E7',
                        peach: '#F7D0B6'
                    },
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                        serif: ['Lora', 'serif'],
                    },
                    boxShadow: {
                        'soft': '0 8px 30px rgba(186, 178, 171, 0.15)',
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #FDFBF7;
            background-image: radial-gradient(#E2D5E7 0.5px, transparent 0.5px), radial-gradient(#E2D5E7 0.5px, #FDFBF7 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #E2D5E7;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #C3D3C4;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .line-through-soft {
            text-decoration: line-through;
            color: #9A928C;
        }
    </style>
</head>
<body class="font-sans text-textMain min-h-screen flex flex-col items-center py-10 px-4">

    <!-- Kontainer Utama -->
    <main class="w-full max-w-xl">
        
        <!-- Header -->
        <header class="text-center mb-10 fade-in">
            <h1 class="font-serif text-4xl font-semibold text-textMain mb-2 tracking-wide">
                <i class="ph ph-sparkle text-peach mr-2"></i>Ruang Teza
            </h1>
            <p id="greetingText" class="text-textLight text-lg font-light">Selamat datang, semoga harimu indah.</p>
        </header>

        <!-- Form Tambah Jadwal -->
        <section class="glass-card rounded-3xl p-6 shadow-soft mb-8 fade-in" style="animation-delay: 0.1s;">
            <h2 class="font-serif text-xl font-medium mb-4 flex items-center gap-2">
                <i class="ph ph-calendar-plus text-sage text-2xl"></i> Tambah Kegiatan
            </h2>
            <form id="scheduleForm" class="space-y-4">
                <div>
                    <input type="text" id="activityName" required placeholder="Apa yang ingin kamu lakukan hari ini?" 
                           class="w-full bg-white/50 border border-white/80 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-sage focus:border-transparent transition text-textMain placeholder-textLight">
                </div>
                
                <div class="flex gap-3">
                    <div class="w-1/3">
                        <input type="time" id="activityTime" required
                               class="w-full bg-white/50 border border-white/80 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-sage focus:border-transparent transition text-textMain cursor-pointer">
                    </div>
                    <div class="w-2/3">
                        <select id="activityCategory" 
                                class="w-full bg-white/50 border border-white/80 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-sage focus:border-transparent transition text-textMain cursor-pointer appearance-none">
                            <option value="Rutinitas">Rutinitas</option>
                            <option value="Hobi">Hobi / Me Time</option>
                            <option value="Tugas">Tugas / Pekerjaan</option>
                        </select>
                    </div>
                </div>

                <button type="submit" 
                        class="w-full bg-textMain text-cream font-medium py-3 rounded-2xl hover:bg-opacity-90 transition shadow-md flex justify-center items-center gap-2 mt-2">
                    <i class="ph ph-plus-circle text-xl"></i> Simpan ke Jadwal
                </button>
            </form>
        </section>

        <!-- Daftar Jadwal -->
        <section class="fade-in" style="animation-delay: 0.2s;">
            <div class="flex justify-between items-end mb-4 px-2">
                <h2 class="font-serif text-2xl font-medium">Jadwal Hari Ini</h2>
                <span id="dateDisplay" class="text-sm text-textLight font-medium"></span>
            </div>
            
            <div id="scheduleList" class="space-y-3">
                <!-- Daftar kegiatan akan muncul di sini via JavaScript -->
            </div>

            <!-- Empty State (Jika Kosong) -->
            <div id="emptyState" class="hidden text-center py-10 opacity-70">
                <i class="ph ph-coffee text-6xl text-textLight mb-3"></i>
                <p class="text-textLight">Belum ada jadwal. Yuk, tambahkan kegiatanmu!</p>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="mt-auto pt-10 pb-4 text-center text-sm text-textLight font-light fade-in" style="animation-delay: 0.3s;">
        Dibuat dengan <i class="ph-fill ph-heart text-blush"></i> untuk Teza
    </footer>

    <!-- Logika Aplikasi (JavaScript) -->
    <script>
        // DOM Elements
        const form = document.getElementById('scheduleForm');
        const listContainer = document.getElementById('scheduleList');
        const emptyState = document.getElementById('emptyState');
        const greetingText = document.getElementById('greetingText');
        const dateDisplay = document.getElementById('dateDisplay');

        // State Array
        let schedules = JSON.parse(localStorage.getItem('tezaSchedules')) || [];

        // Konfigurasi Warna Kategori
        const categoryColors = {
            'Rutinitas': 'bg-dustyBlue text-slate-700',
            'Hobi': 'bg-blush text-rose-800',
            'Tugas': 'bg-peach text-orange-800'
        };

        const categoryIcons = {
            'Rutinitas': 'ph-repeat',
            'Hobi': 'ph-palette',
            'Tugas': 'ph-briefcase'
        };

        // Fungsi Waktu & Sapaan
        function updateDateTime() {
            const now = new Date();
            const hour = now.getHours();
            
            // Format Tanggal (Contoh: 14 April 2026)
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            dateDisplay.textContent = now.toLocaleDateString('id-ID', options);

            // Sapaan
            let greeting = 'Halo, Teza!';
            if (hour >= 5 && hour < 12) greeting = 'Selamat Pagi, Teza! ☀️';
            else if (hour >= 12 && hour < 15) greeting = 'Selamat Siang, Teza! 🌤️';
            else if (hour >= 15 && hour < 18) greeting = 'Selamat Sore, Teza! ⛅';
            else greeting = 'Selamat Malam, Teza! 🌙';
            
            greetingText.textContent = `${greeting} Semoga harimu menyenangkan.`;
        }

        // Simpan ke LocalStorage
        function saveSchedules() {
            localStorage.setItem('tezaSchedules', JSON.stringify(schedules));
        }

        // Render (Tampilkan) Jadwal
        function renderSchedules() {
            listContainer.innerHTML = '';

            if (schedules.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                
                // Urutkan berdasarkan waktu
                schedules.sort((a, b) => a.time.localeCompare(b.time));

                schedules.forEach(schedule => {
                    const item = document.createElement('div');
                    const isCompleted = schedule.completed ? 'opacity-60' : '';
                    const textStrike = schedule.completed ? 'line-through-soft' : '';
                    const checkIcon = schedule.completed ? 'ph-fill ph-check-circle text-sage' : 'ph ph-circle text-textLight hover:text-sage';
                    
                    item.className = `glass-card rounded-2xl p-4 shadow-sm flex items-center justify-between transition-all hover:shadow-md fade-in ${isCompleted}`;
                    item.innerHTML = `
                        <div class="flex items-center gap-4">
                            <button onclick="toggleComplete(${schedule.id})" class="text-3xl transition-transform hover:scale-110 focus:outline-none">
                                <i class="${checkIcon}"></i>
                            </button>
                            <div>
                                <h3 class="font-semibold text-lg ${textStrike}">${schedule.name}</h3>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="text-sm text-textLight flex items-center gap-1">
                                        <i class="ph ph-clock"></i> ${schedule.time}
                                    </span>
                                    <span class="text-xs px-2 py-0.5 rounded-full font-medium flex items-center gap-1 ${categoryColors[schedule.category]}">
                                        <i class="ph ${categoryIcons[schedule.category]}"></i> ${schedule.category}
                                    </span>
                                </div>
                            </div>
                        </div>
                        <button onclick="deleteSchedule(${schedule.id})" class="text-textLight hover:text-red-400 p-2 transition-colors focus:outline-none" title="Hapus Kegiatan">
                            <i class="ph ph-trash text-xl"></i>
                        </button>
                    `;
                    listContainer.appendChild(item);
                });
            }
        }

        // Tambah Jadwal Baru
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nameInput = document.getElementById('activityName').value;
            const timeInput = document.getElementById('activityTime').value;
            const categoryInput = document.getElementById('activityCategory').value;

            const newSchedule = {
                id: Date.now(), // Unique ID
                name: nameInput,
                time: timeInput,
                category: categoryInput,
                completed: false
            };

            schedules.push(newSchedule);
            saveSchedules();
            renderSchedules();
            
            // Reset form
            form.reset();
        });

        // Hapus Jadwal
        window.deleteSchedule = function(id) {
            schedules = schedules.filter(schedule => schedule.id !== id);
            saveSchedules();
            renderSchedules();
        }

        // Tandai Selesai
        window.toggleComplete = function(id) {
            schedules = schedules.map(schedule => {
                if (schedule.id === id) {
                    return { ...schedule, completed: !schedule.completed };
                }
                return schedule;
            });
            saveSchedules();
            renderSchedules();
        }

        // Inisialisasi awal
        updateDateTime();
        renderSchedules();
        
        // Update waktu setiap menit
        setInterval(updateDateTime, 60000);

    </script>
</body>
</html>
